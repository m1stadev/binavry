repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
    -   id: ruff
        args: [--fix, --unsafe-fixes]
    -   id: ruff-format
-   repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.54
    hooks:
        - id: ty
-   repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.23
    hooks:
        - id: uv-lock